<!-- Mobile Navigation mit W3C Hamburger 

https://www.w3schools.com/howto/tryit.asp?filename=tryhow_js_mobile_navbar

hier auch mit id gearbeitet, damit ich die mobile und desktop nav mit einem script steuern kann.

-->

  <a href="../index.html" class="active">Logo</a>

    <a href="../index.html">Home</a>

    <i class="fa fa-bars"></i>
  </a>
</div>

<!-- Header mit W3C Container 

https://www.w3schools.com/w3css/w3css_containers.asp

container für flexible gestaltung und responsive design

-->

<header class="w3-container">
  <h1>Lazy Loading Video</h1>
</header>

<!-- Video Container mit Lazy Loading 

https://www.w3schools.com/jsref/event_onload.asp
https://www.w3schools.com/jsref/api_intersectionobserver.asp

Lazy Loading bedeutet: Das Video wird erst geladen, wenn der Benutzer 
in die Nähe des Videos scrollt. Das spart Bandbreite und lädt schneller.

Der data-src Attribut speichert den eigentlichen Video-Pfad.
Das Video wird dann mit JavaScript geladen wenn es sichtbar wird.

-->

<main class="w3-container video-container">
  <div class="video-wrapper">
    <video 
      width="100%" 
      height="auto"
      controls
      poster="../img/ohne.webp">
      <source src="../img/rick.mp4" type="video/mp4" preload="none" class="lazy-video">
      Dein Browser unterstützt HTML5 Video nicht.
    </video>
  </div>
</main>

<!-- Verlinkung zu JS Folder für alle Scripts
  
navbar.js: für mobile und desktop Navigation
lazy-load.js: für Video Lazy Loading Funktionalität

-->

<script src="../js/navbar.js"></script>
<script src="../js/lazy-load.js"></script>

</body>
</html>
